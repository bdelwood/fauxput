#cloud-config
# First-boot provisioning for the fauxput Mutter/GNOME test VM.

hostname: fauxput-test-gnome
fqdn: fauxput-test-gnome.local

users:
  - name: test
    groups: [wheel, input, video]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: false
    plain_text_passwd: test
    shell: /bin/bash

ssh_pwauth: true

packages:
  - libxcvt
  - openssh-server
  # for sunshine pairing
  - epiphany
  - bats
  # Sunshine runtime deps
  - ffmpeg-free
  - libdrm
  - libcap

write_files:
  # GDM auto-login. Assert WaylandEnable so an update can't flip it.
  - path: /etc/gdm/custom.conf
    content: |
      [daemon]
      AutomaticLoginEnable=true
      AutomaticLogin=test
      WaylandEnable=true
  # Auto-load vkms at boot.
  - path: /etc/modules-load.d/vkms.conf
    content: |
      vkms
  # Suppress vkms's default device — ghost "Unknown Display" in Settings otherwise.
  - path: /etc/modprobe.d/vkms.conf
    content: |
      options vkms create_default_dev=0
  # Sunshine baseline config
  # use portal capture, software encoder
  - path: /home/test/.config/sunshine/sunshine.conf
    defer: true
    owner: test:test
    permissions: '0644'
    content: |
      sunshine_name = fauxput-test
      capture = portal
      encoder = software
      min_log_level = info
  # Sunshine test app.
  - path: /home/test/.config/sunshine/apps.json
    defer: true
    owner: test:test
    permissions: '0644'
    content: |
      {
        "env": { "PATH": "$(PATH):/usr/local/bin" },
        "apps": [
          {
            "name": "fauxput Desktop",
            "prep-cmd": [
              {
                "do": "/usr/local/bin/fauxput up --width 1920 --height 1080 --fps 60 --primary",
                "undo": "/usr/local/bin/fauxput down"
              }
            ]
          }
        ]
      }
  # SELinux permissive to keep incus agent working
  - path: /etc/selinux/config
    defer: true
    content: |
      SELINUX=permissive
      SELINUXTYPE=targeted
  # Install dkms + vkms-edid, handling the Fedora cloud image kernel race:
  # repos have moved past the image's kernel (7.0.4) to 7.0.6, so dkms's
  # rich-dep pulls 7.0.6 as a side effect. Accept the upgrade, build DKMS
  # for the new kernel, pivot boot to it.
  - path: /usr/local/sbin/install-vkms-edid.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euxo pipefail
      dnf install -y dkms gcc kernel-modules kernel-modules-extra
      NEW_KERNEL=$(rpm -q --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}\n' kernel-core | sort -V | tail -1)
      until [ -f /mnt/vkms-src/dkms.conf ]; do sleep 1; done
      cp -rT /mnt/vkms-src /usr/src/vkms-edid-0.1
      dkms add -m vkms-edid -v 0.1
      dkms install -m vkms-edid -v 0.1 -k "$NEW_KERNEL"
      dracut -f --kver "$NEW_KERNEL"
      RUNNING_KERNEL=$(uname -r)
      if [ "$RUNNING_KERNEL" != "$NEW_KERNEL" ]; then
          find /boot/loader/entries -name "*${RUNNING_KERNEL}*.conf" -exec mv {} /tmp/ \;
          grub2-mkconfig -o /boot/grub2/grub.cfg
      fi

runcmd:
  - systemctl enable --now sshd
  # Install + build patched vkms (handles kernel upgrade internally).
  - /usr/local/sbin/install-vkms-edid.sh
  # Minimal GNOME: Mutter + shell + gdm + session. Exclude kernel-* so the
  # @gnome-desktop weak-dep chain can't pull *another* kernel upgrade.
  - dnf install -y --exclude='kernel*' @gnome-desktop
  # Install Sunshine + seed dev creds.
  - dnf install -y https://github.com/LizardByte/Sunshine/releases/download/v2026.516.143833/Sunshine-2026.516.143833-1.fc44.x86_64.rpm
  - sudo -iu test sunshine --creds admin admin
  - chown -R test:test /home/test/.config
  # Start sunshine. Unit has the Flathub-style reverse-DNS name in 2026.x.
  - sudo -iu test systemctl --user enable app-dev.lizardbyte.app.Sunshine.service
  - loginctl enable-linger test
  - systemctl set-default graphical.target
