name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build/upload (e.g. v0.6.0)
        required: true

jobs:
  upload:
    name: Upload prebuilt binary (${{ matrix.target }})
    if: ${{ github.repository_owner == 'bdelwood' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcvt-dev libwayland-dev libdrm-dev pkg-config

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Build + upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: fauxput
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          tar: unix
          checksum: sha256
          locked: true
          include: LICENSE,contrib
          ref: refs/tags/${{ github.event.release.tag_name || inputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
