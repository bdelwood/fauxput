name: Build docs (mdbook + rustdoc)

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "build.rs"
      - "docs/**"
      - "README.md"
      - "Cargo.toml"
      - "Cargo.lock"
      - "justfile"
      - ".github/workflows/docs.yaml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps for cargo doc
        # libxcvt + wayland + libdrm — fauxput build deps.
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcvt-dev libwayland-dev libdrm-dev pkg-config

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install mdbook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Build combined docs site
        run: just docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
